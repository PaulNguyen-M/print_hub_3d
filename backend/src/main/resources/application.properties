# ============================================================================
# PrintHub 3D Backend Configuration
# ============================================================================

# Application
spring.application.name=printhub3d-backend
server.port=8080
server.servlet.context-path=/

# ============================================================================
# Database Configuration
# ============================================================================
# Cấu hình qua biến môi trường (có giá trị mặc định cho dev). Production BẮT BUỘC set env.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/print3d_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:290104}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL10Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# File upload limits (STL files có thể lớn)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ============================================================================
# JWT Configuration
# ============================================================================
# Secret mặc định mạnh cho dev; production set JWT_SECRET (chuỗi ngẫu nhiên >=32 ký tự).
# Key khớp với @Value trong JwtTokenProvider (jwt.secret / jwt.expiration / jwt.refresh-expiration).
jwt.secret=${JWT_SECRET:k9Qh2mZ7vR4tBxN8pL3sW6yJ1cF5dG0uH7eA2iO4rT9nM6bK3xVqUzP8wY5lS1D}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ============================================================================
# CORS Configuration
# ============================================================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=*
app.cors.exposed-headers=Authorization
app.cors.allow-credentials=true
app.cors.max-age=3600

# ============================================================================
# AWS S3 Configuration (for STL files)
# ============================================================================
aws.s3.bucket-name=printhub3d-stl-files
aws.s3.region=us-east-1
aws.s3.access-key=your-access-key
aws.s3.secret-key=your-secret-key
aws.s3.folder.uploads=uploads/
aws.s3.endpoint=https://s3.amazonaws.com

# ============================================================================
# Cloudinary Configuration (for product images)
# ============================================================================
cloudinary.cloud-name=your-cloud-name
cloudinary.api-key=your-api-key
cloudinary.api-secret=your-api-secret

# ============================================================================
# Stripe Configuration (thanh toán)
# ============================================================================
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.currency=usd
stripe.success-url=${STRIPE_SUCCESS_URL:http://localhost:5173/checkout/success}
stripe.cancel-url=${STRIPE_CANCEL_URL:http://localhost:5173/checkout/cancel}

# ============================================================================
# Marketplace (Shop / Seller) Configuration
# ============================================================================
# Opening fee charged when a buyer applies to open a shop (VND). 0 = free.
marketplace.shop.opening-fee=0
# Default platform commission taken from each completed sale (fraction, 0.15 = 15%).
marketplace.shop.commission-rate=0.15

# ============================================================================
# Logging
# ============================================================================
logging.level.root=INFO
logging.level.com.printhub3.backend=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/printhub3d.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# ============================================================================
# Jackson Configuration
# ============================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# ============================================================================
# Actuator Configuration
# ============================================================================
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=when-authorized
